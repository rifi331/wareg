<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recipes - Wareg</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
</head>
<body class="bg-gray-50 min-h-screen">
    <div id="toast-container" class="fixed top-4 right-4 z-50 space-y-2"></div>

    <nav class="bg-emerald-600 text-white shadow-lg sticky top-0 z-40">
        <div class="max-w-6xl mx-auto px-4">
            <div class="flex justify-between items-center py-4 gap-4">
                <a href="/" class="text-2xl font-bold hover:text-emerald-100">Wareg</a>
                <div class="flex gap-2 flex-wrap">
                    <a href="/" class="px-3 py-2 hover:bg-emerald-700 rounded">Dashboard</a>
                    <a href="/recipes" class="px-3 py-2 bg-emerald-700 rounded">Recipes</a>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto px-4 py-8">
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-3xl font-bold text-gray-800">Recipes</h1>
            <button onclick="toggleRecipeForm()" class="bg-emerald-600 text-white px-6 py-2 rounded-md hover:bg-emerald-700 transition">Add New Recipe</button>
        </div>

        <div class="mb-6">
            <input type="text" id="recipe-search" placeholder="Search recipes by title or description..."
                   class="w-full px-4 py-3 border rounded-lg focus:outline-none focus:ring-2 focus:ring-emerald-500"
                   oninput="filterRecipes(this.value)">
        </div>

        <div id="recipe-form-container" class="bg-white rounded-lg shadow-md p-6 mb-6 hidden"></div>

        <div id="recipes-list" hx-get="/api/recipes" hx-trigger="load" class="grid gap-6 md:grid-cols-2 lg:grid-cols-3"></div>
    </main>

    <script src="/static/recipe-form.js?v=4"></script>
</body>
</html>
