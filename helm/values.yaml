replicaCount: 1

image:
  repository: ghcr.io/yourusername/wareg
  pullPolicy: IfNotPresent
  tag: "latest"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
    - ALL
  readOnlyRootFilesystem: false
  runAsNonRoot: true
  runAsUser: 1000

service:
  type: ClusterIP
  port: 7001

ingress:
  enabled: false
  className: "traefik"
  annotations: {}
    # cert-manager.io/cluster-issuer: "letsencrypt-prod"
  hosts:
    - host: cooking-app.example.com
      paths:
        - path: /
          pathType: Prefix
  tls: []
  #  - secretName: cooking-app-tls
  #    hosts:
  #      - cooking-app.example.com

resources: {}
  # limits:
  #   cpu: 500m
  #   memory: 512Mi
  # requests:
  #   cpu: 250m
  #   memory: 256Mi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

nodeSelector: {}

tolerations: []

affinity: {}

# Database Configuration
database:
  url: "postgres://YOUR_DB_USER:YOUR_DB_PASSWORD@YOUR_DB_HOST:5432/YOUR_DB_NAME?search_path=wareg"
  # Prefer a Kubernetes Secret in production. Set existingSecret to its name and
  # (optionally) secretKey to the key holding DATABASE_URL (default: database-url).
  existingSecret: ""
  secretKey: "database-url"

# Environment variables
env:
  port: "7001"

# Persistence
persistence:
  enabled: false
  # existingClaim: "wareg-pvc"
  # storageClass: "local-path"
  # accessModes:
  #   - ReadWriteOnce
  # size: 1Gi
  # mountPath: /app/data

# Health check
livenessProbe:
  httpGet:
    path: /healthz
    port: 7001
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /healthz
    port: 7001
  initialDelaySeconds: 10
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 3
