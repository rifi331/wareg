replicaCount: 1

image:
  repository: ghcr.io/rifi331/wareg
  pullPolicy: IfNotPresent
  tag: "latest"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
    - ALL
  readOnlyRootFilesystem: false
  runAsNonRoot: true
  runAsUser: 1000

service:
  type: ClusterIP
  port: 7001

ingress:
  enabled: false
  className: "traefik"
  annotations: {}
  hosts:
    - host: cooking-app.example.com
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 250m
    memory: 256Mi

# Database — set DATABASE_URL here OR use existingSecret (recommended).
database:
  url: "postgres://postgres:YOUR_DB_PASSWORD@YOUR_DB_HOST:5432/postgres?search_path=wareg"
  existingSecret: ""
  secretKey: "database-url"

# HTTP Basic Auth — set to "user1:pass1,user2:pass2" to enable, leave empty
# to disable auth entirely (not recommended for public deployments).
authUsers: ""

# Environment variables
env:
  port: "7001"

# Health check
livenessProbe:
  httpGet:
    path: /healthz
    port: 7001
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /healthz
    port: 7001
  initialDelaySeconds: 10
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 3
