version: "3.8"

services:
  db:
    image: postgres:16-alpine
    container_name: wareg-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-wareg}
      # Required: no hardcoded default. Fails closed if unset.
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-wareg}
    volumes:
      - wareg-db-data:/var/lib/postgresql/data
      - ./sql/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./sql/seed_data.sql:/docker-entrypoint-initdb.d/02-seed.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-wareg} -d ${POSTGRES_DB:-wareg}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - wareg-network

  app:
    build: .
    container_name: wareg-app
    depends_on:
      db:
        condition: service_healthy
    environment:
      # Compose expands POSTGRES_* at parse time. Override DATABASE_URL to use an
      # external database instead of the `db` service below.
      DATABASE_URL: ${DATABASE_URL:-postgres://${POSTGRES_USER:-wareg}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-wareg}?search_path=wareg}
      PORT: ${PORT:-7001}
    ports:
      - "${PORT:-7001}:7001"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:${PORT:-7001}/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      - wareg-network

volumes:
  wareg-db-data:

networks:
  wareg-network:
    driver: bridge
