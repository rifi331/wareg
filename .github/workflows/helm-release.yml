name: Release Helm Chart

on:
  push:
    branches: [ main ]
    paths:
      - 'helm/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup Helm
      uses: azure/setup-helm@v3
      with:
        version: 'v3.13.0'

    - name: Package Helm Chart
      run: |
        mkdir -p charts
        helm package helm --destination charts
        ls -1 charts/wareg-cooking-app-*.tgz

    - name: Merge existing index (preserve prior versions)
      run: |
        REPO_URL="https://${{ github.repository_owner }}.github.io/wareg/"
        curl -fsSL "${REPO_URL}index.yaml" -o charts/existing-index.yaml || true
        if [ -f charts/existing-index.yaml ]; then
          helm repo index charts --url "${REPO_URL}" --merge charts/existing-index.yaml
        else
          helm repo index charts --url "${REPO_URL}"
        fi

    - name: Setup Pages
      uses: actions/configure-pages@v4

    - name: Upload artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: charts

    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
